server:
  port: ${SERVER_PORT:8082}
spring:
  application:
    name: VEHICULOS-SERVICE
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/prueba1?createDatabaseIfNotExist=true&serverTimezone=America/Santiago}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
springdoc:
  swagger-ui:
    path: /swagger-ui.html
management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    com.duoc.msvehiculos: INFO
